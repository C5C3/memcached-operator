{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "memcached-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "memcached-operator.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "memcached-operator.selectorLabels" . | nindent 6 }}
      control-plane: controller-manager
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 8081
          protocol: TCP
        - port: 8443
          protocol: TCP
        {{- if .Values.webhook.enabled }}
        - port: 9443
          protocol: TCP
        {{- end }}
  egress:
    # DNS resolution (TCP + UDP).
    - ports:
        - port: 53
          protocol: TCP
        - port: 53
          protocol: UDP
    # Kubernetes API server.
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
    {{- if .Values.webhook.enabled }}
    # Webhook callback port.
    - ports:
        - port: 9443
          protocol: TCP
    {{- end }}
{{- end }}
