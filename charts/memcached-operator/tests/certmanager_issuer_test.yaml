---
suite: cert-manager Issuer template
templates:
  - templates/certmanager/issuer.yaml
release:
  name: test-release
  namespace: test-ns
chart:
  appVersion: "0.2.0"
  version: "0.2.0"
tests:
  # ====================================================================
  # Suite 1: Conditional rendering
  # ====================================================================

  - it: should not render when webhook.enabled is false
    set:
      webhook.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render when certmanager.enabled is false
    set:
      certmanager.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render when both webhook.enabled and certmanager.enabled are true (defaults)
    asserts:
      - hasDocuments:
          count: 1

  # ====================================================================
  # Suite 2: Kind and API version
  # ====================================================================

  - it: should render correct kind and apiVersion
    asserts:
      - isKind:
          of: Issuer
      - isAPIVersion:
          of: cert-manager.io/v1

  # ====================================================================
  # Suite 3: Metadata
  # ====================================================================

  - it: should set name using fullname with selfsigned-issuer suffix
    asserts:
      - equal:
          path: metadata.name
          value: test-release-memcached-operator-selfsigned-issuer

  - it: should set namespace to release namespace
    asserts:
      - equal:
          path: metadata.namespace
          value: test-ns

  # ====================================================================
  # Suite 4: Labels
  # ====================================================================

  - it: should include all standard labels
    asserts:
      - exists:
          path: metadata.labels["helm.sh/chart"]
      - exists:
          path: metadata.labels["app.kubernetes.io/name"]
      - exists:
          path: metadata.labels["app.kubernetes.io/instance"]
      - exists:
          path: metadata.labels["app.kubernetes.io/version"]
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm

  # ====================================================================
  # Suite 5: Spec
  # ====================================================================

  - it: should have selfSigned as empty object
    asserts:
      - equal:
          path: spec.selfSigned
          value: {}
