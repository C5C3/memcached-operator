---
suite: Leader election Role and RoleBinding templates
templates:
  - templates/rbac/leader-election-role.yaml
release:
  name: test-release
  namespace: test-ns
tests:
  # -- Gate: rbac.create AND leaderElection.enabled --
  - it: should render Role and RoleBinding when both rbac.create and leaderElection.enabled are true (default)
    asserts:
      - hasDocuments:
          count: 2

  - it: should not render when rbac.create is false
    set:
      rbac.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render when leaderElection.enabled is false
    set:
      leaderElection.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render when both are false
    set:
      rbac.create: false
      leaderElection.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  # -- Role (document 0) --
  - it: should render Role as first document
    documentIndex: 0
    asserts:
      - isKind:
          of: Role
      - isAPIVersion:
          of: rbac.authorization.k8s.io/v1

  - it: should set Role name with fullname prefix
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.name
          value: test-release-memcached-operator-leader-election-role

  - it: should set Role namespace to release namespace
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.namespace
          value: test-ns

  - it: should include standard labels on Role
    documentIndex: 0
    asserts:
      - exists:
          path: metadata.labels["helm.sh/chart"]
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm

  - it: should have exactly 3 rules
    documentIndex: 0
    asserts:
      - lengthEqual:
          path: rules
          count: 3

  - it: should grant CRUD on configmaps
    documentIndex: 0
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - configmaps
            verbs:
              - get
              - list
              - watch
              - create
              - update
              - patch
              - delete

  - it: should grant CRUD on leases
    documentIndex: 0
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - coordination.k8s.io
            resources:
              - leases
            verbs:
              - get
              - list
              - watch
              - create
              - update
              - patch
              - delete

  - it: should grant create and patch on events
    documentIndex: 0
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - events
            verbs:
              - create
              - patch

  # -- RoleBinding (document 1) --
  - it: should render RoleBinding as second document
    documentIndex: 1
    asserts:
      - isKind:
          of: RoleBinding
      - isAPIVersion:
          of: rbac.authorization.k8s.io/v1

  - it: should set RoleBinding name with fullname prefix
    documentIndex: 1
    asserts:
      - equal:
          path: metadata.name
          value: test-release-memcached-operator-leader-election-rolebinding

  - it: should set RoleBinding namespace to release namespace
    documentIndex: 1
    asserts:
      - equal:
          path: metadata.namespace
          value: test-ns

  - it: should reference the leader-election-role Role
    documentIndex: 1
    asserts:
      - equal:
          path: roleRef.apiGroup
          value: rbac.authorization.k8s.io
      - equal:
          path: roleRef.kind
          value: Role
      - equal:
          path: roleRef.name
          value: test-release-memcached-operator-leader-election-role

  - it: should bind to the service account in release namespace
    documentIndex: 1
    asserts:
      - equal:
          path: subjects[0].kind
          value: ServiceAccount
      - equal:
          path: subjects[0].name
          value: test-release-memcached-operator
      - equal:
          path: subjects[0].namespace
          value: test-ns

  - it: should include standard labels on RoleBinding
    documentIndex: 1
    asserts:
      - exists:
          path: metadata.labels["helm.sh/chart"]
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm
