---
suite: NetworkPolicy template
templates:
  - templates/networkpolicy.yaml
release:
  name: test-release
  namespace: test-ns
chart:
  appVersion: "0.2.0"
  version: "0.2.0"
tests:
  # ====================================================================
  # Suite 1: Conditional rendering
  # ====================================================================

  - it: should render when networkPolicy.enabled is true (default)
    asserts:
      - hasDocuments:
          count: 1

  - it: should not render when networkPolicy.enabled is false
    set:
      networkPolicy.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  # ====================================================================
  # Suite 2: Kind and API version
  # ====================================================================

  - it: should render correct kind and apiVersion
    asserts:
      - isKind:
          of: NetworkPolicy
      - isAPIVersion:
          of: networking.k8s.io/v1

  # ====================================================================
  # Suite 3: Metadata
  # ====================================================================

  - it: should set name using fullname helper
    asserts:
      - equal:
          path: metadata.name
          value: test-release-memcached-operator

  - it: should set namespace to release namespace
    asserts:
      - equal:
          path: metadata.namespace
          value: test-ns

  - it: should include all standard labels
    asserts:
      - exists:
          path: metadata.labels["helm.sh/chart"]
      - exists:
          path: metadata.labels["app.kubernetes.io/name"]
      - exists:
          path: metadata.labels["app.kubernetes.io/instance"]
      - exists:
          path: metadata.labels["app.kubernetes.io/version"]
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm

  # ====================================================================
  # Suite 4: Pod selector
  # ====================================================================

  - it: should select pods using selectorLabels plus control-plane
    asserts:
      - equal:
          path: spec.podSelector.matchLabels["app.kubernetes.io/name"]
          value: memcached-operator
      - equal:
          path: spec.podSelector.matchLabels["app.kubernetes.io/instance"]
          value: test-release
      - equal:
          path: spec.podSelector.matchLabels.control-plane
          value: controller-manager

  # ====================================================================
  # Suite 5: Policy types
  # ====================================================================

  - it: should include Ingress and Egress policy types
    asserts:
      - contains:
          path: spec.policyTypes
          content: Ingress
      - contains:
          path: spec.policyTypes
          content: Egress

  # ====================================================================
  # Suite 6: Ingress rules - base ports
  # ====================================================================

  - it: should include health port 8081 in ingress
    asserts:
      - contains:
          path: spec.ingress[0].ports
          content:
            port: 8081
            protocol: TCP

  - it: should include metrics port 8443 in ingress
    asserts:
      - contains:
          path: spec.ingress[0].ports
          content:
            port: 8443
            protocol: TCP

  # ====================================================================
  # Suite 7: Conditional webhook port (REQ-006)
  # ====================================================================

  - it: should include webhook port 9443 when webhook.enabled is true (default)
    asserts:
      - contains:
          path: spec.ingress[0].ports
          content:
            port: 9443
            protocol: TCP

  - it: should not include webhook port 9443 when webhook.enabled is false
    set:
      webhook.enabled: false
    asserts:
      - notContains:
          path: spec.ingress[0].ports
          content:
            port: 9443
            protocol: TCP

  - it: should still include health and metrics ports when webhook.enabled is false
    set:
      webhook.enabled: false
    asserts:
      - contains:
          path: spec.ingress[0].ports
          content:
            port: 8081
            protocol: TCP
      - contains:
          path: spec.ingress[0].ports
          content:
            port: 8443
            protocol: TCP

  # ====================================================================
  # Suite 8: Egress rules
  # ====================================================================

  - it: should allow all egress
    asserts:
      - equal:
          path: spec.egress[0]
          value: {}

  # ====================================================================
  # Suite 9: fullnameOverride propagation
  # ====================================================================

  - it: should propagate fullnameOverride to name
    set:
      fullnameOverride: my-custom-name
    asserts:
      - equal:
          path: metadata.name
          value: my-custom-name
