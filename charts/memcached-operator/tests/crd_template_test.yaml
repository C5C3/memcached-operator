---
suite: CRD template toggle
templates:
  - templates/crd-template.yaml
release:
  name: test-release
  namespace: test-ns
chart:
  appVersion: "0.1.0"
  version: "0.1.0"
tests:
  - it: should not render CRD when managedByHelm is false (default)
    asserts:
      - hasDocuments:
          count: 0

  - it: should render CRD when managedByHelm is true
    set:
      crds.managedByHelm: true
    asserts:
      - hasDocuments:
          count: 1

  - it: should render CRD with correct kind and apiVersion
    set:
      crds.managedByHelm: true
    asserts:
      - isKind:
          of: CustomResourceDefinition
      - isAPIVersion:
          of: apiextensions.k8s.io/v1

  - it: should set CRD name to memcacheds.memcached.c5c3.io
    set:
      crds.managedByHelm: true
    asserts:
      - equal:
          path: metadata.name
          value: memcacheds.memcached.c5c3.io

  - it: should include standard Helm labels on CRD
    set:
      crds.managedByHelm: true
    asserts:
      - equal:
          path: metadata.labels["helm.sh/chart"]
          value: memcached-operator-0.1.0
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: memcached-operator
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: test-release
      - equal:
          path: metadata.labels["app.kubernetes.io/version"]
          value: "0.1.0"
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm

  - it: should set correct CRD spec fields
    set:
      crds.managedByHelm: true
    asserts:
      - equal:
          path: spec.group
          value: memcached.c5c3.io
      - equal:
          path: spec.names.kind
          value: Memcached
      - equal:
          path: spec.names.plural
          value: memcacheds
      - equal:
          path: spec.scope
          value: Namespaced
