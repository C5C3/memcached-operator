---
suite: ServiceAccount template
templates:
  - templates/serviceaccount.yaml
release:
  name: test-release
  namespace: test-ns
tests:
  # -- Gate: serviceAccount.create --
  - it: should render ServiceAccount when serviceAccount.create is true (default)
    asserts:
      - hasDocuments:
          count: 1

  - it: should not render ServiceAccount when serviceAccount.create is false
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  # -- Kind and API version --
  - it: should render correct kind and apiVersion
    asserts:
      - isKind:
          of: ServiceAccount
      - isAPIVersion:
          of: v1

  # -- Metadata --
  - it: should set name from fullname by default
    asserts:
      - equal:
          path: metadata.name
          value: test-release-memcached-operator

  - it: should set namespace to release namespace
    asserts:
      - equal:
          path: metadata.namespace
          value: test-ns

  - it: should use serviceAccount.name when set
    set:
      serviceAccount.name: custom-sa
    asserts:
      - equal:
          path: metadata.name
          value: custom-sa

  # -- Labels --
  - it: should include all standard labels
    asserts:
      - exists:
          path: metadata.labels["helm.sh/chart"]
      - exists:
          path: metadata.labels["app.kubernetes.io/name"]
      - exists:
          path: metadata.labels["app.kubernetes.io/instance"]
      - exists:
          path: metadata.labels["app.kubernetes.io/version"]
      - exists:
          path: metadata.labels["app.kubernetes.io/managed-by"]

  - it: should set managed-by to Helm
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm

  # -- Annotations --
  - it: should not include annotations by default
    asserts:
      - notExists:
          path: metadata.annotations

  - it: should include annotations when serviceAccount.annotations is set
    set:
      serviceAccount.annotations:
        eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/my-role"
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: "arn:aws:iam::123456789012:role/my-role"

  - it: should support multiple annotations
    set:
      serviceAccount.annotations:
        key1: value1
        key2: value2
    asserts:
      - equal:
          path: metadata.annotations.key1
          value: value1
      - equal:
          path: metadata.annotations.key2
          value: value2
