---
suite: cert-manager Certificate template
templates:
  - templates/certmanager/certificate.yaml
release:
  name: test-release
  namespace: test-ns
chart:
  appVersion: "0.2.0"
  version: "0.2.0"
tests:
  # ====================================================================
  # Suite 1: Conditional rendering
  # ====================================================================

  - it: should not render when webhook.enabled is false
    set:
      webhook.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render when certmanager.enabled is false
    set:
      certmanager.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render when both webhook.enabled and certmanager.enabled are true (defaults)
    asserts:
      - hasDocuments:
          count: 1

  # ====================================================================
  # Suite 2: Kind and API version
  # ====================================================================

  - it: should render correct kind and apiVersion
    asserts:
      - isKind:
          of: Certificate
      - isAPIVersion:
          of: cert-manager.io/v1

  # ====================================================================
  # Suite 3: Metadata
  # ====================================================================

  - it: should set name using fullname with webhook-cert suffix
    asserts:
      - equal:
          path: metadata.name
          value: test-release-memcached-operator-webhook-cert

  - it: should set namespace to release namespace
    asserts:
      - equal:
          path: metadata.namespace
          value: test-ns

  # ====================================================================
  # Suite 4: Labels
  # ====================================================================

  - it: should include all standard labels
    asserts:
      - exists:
          path: metadata.labels["helm.sh/chart"]
      - exists:
          path: metadata.labels["app.kubernetes.io/name"]
      - exists:
          path: metadata.labels["app.kubernetes.io/instance"]
      - exists:
          path: metadata.labels["app.kubernetes.io/version"]
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm

  # ====================================================================
  # Suite 5: DNS names
  # ====================================================================

  - it: should contain dnsNames with .svc suffix
    asserts:
      - contains:
          path: spec.dnsNames
          content: test-release-memcached-operator-webhook.test-ns.svc

  - it: should contain dnsNames with .svc.cluster.local suffix
    asserts:
      - contains:
          path: spec.dnsNames
          content: test-release-memcached-operator-webhook.test-ns.svc.cluster.local

  # ====================================================================
  # Suite 6: Issuer reference
  # ====================================================================

  - it: should set issuerRef.kind to Issuer
    asserts:
      - equal:
          path: spec.issuerRef.kind
          value: Issuer

  - it: should set issuerRef.name to fullname-selfsigned-issuer
    asserts:
      - equal:
          path: spec.issuerRef.name
          value: test-release-memcached-operator-selfsigned-issuer

  # ====================================================================
  # Suite 7: Private key
  # ====================================================================

  - it: should set privateKey.rotationPolicy to Always
    asserts:
      - equal:
          path: spec.privateKey.rotationPolicy
          value: Always

  # ====================================================================
  # Suite 8: Secret name
  # ====================================================================

  - it: should set secretName using fullname with webhook-cert-secret suffix
    asserts:
      - equal:
          path: spec.secretName
          value: test-release-memcached-operator-webhook-cert-secret
