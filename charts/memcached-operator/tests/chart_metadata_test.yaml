---
suite: Chart.yaml metadata and values.yaml defaults
templates:
  - templates/NOTES.txt
release:
  name: test-release
  namespace: test-ns
tests:
  - it: should render NOTES.txt with default fullname
    asserts:
      - matchRegexRaw:
          pattern: "test-release-memcached-operator has been installed"

  - it: should show crds/ directory management by default
    asserts:
      - matchRegexRaw:
          pattern: "CRD management: Helm crds/ directory \\(default\\)"
      - notMatchRegexRaw:
          pattern: "CRD management: Helm-managed"

  - it: should show Helm-managed CRD when toggled
    set:
      crds.managedByHelm: true
    asserts:
      - matchRegexRaw:
          pattern: "CRD management: Helm-managed \\(crds\\.managedByHelm=true\\)"
      - notMatchRegexRaw:
          pattern: "CRD management: Helm crds/ directory"

  - it: should include selector labels in kubectl command
    asserts:
      - matchRegexRaw:
          pattern: "app\\.kubernetes\\.io/name=memcached-operator"
      - matchRegexRaw:
          pattern: "app\\.kubernetes\\.io/instance=test-release"

  - it: should show ServiceAccount name with defaults
    asserts:
      - matchRegexRaw:
          pattern: "ServiceAccount: test-release-memcached-operator"

  - it: should show custom ServiceAccount name
    set:
      serviceAccount.name: "custom-sa"
    asserts:
      - matchRegexRaw:
          pattern: "ServiceAccount: custom-sa"

  - it: should show RBAC is Helm-managed by default
    asserts:
      - matchRegexRaw:
          pattern: "RBAC: Helm-managed \\(rbac\\.create=true\\)"

  - it: should show RBAC warning when rbac.create is false
    set:
      rbac.create: false
    asserts:
      - matchRegexRaw:
          pattern: "WARNING: RBAC resources are not managed by this chart"
      - notMatchRegexRaw:
          pattern: "RBAC: Helm-managed"

  - it: should show webhooks enabled by default
    asserts:
      - matchRegexRaw:
          pattern: "Webhooks: enabled"

  - it: should show webhooks disabled when webhook.enabled is false
    set:
      webhook.enabled: false
    asserts:
      - matchRegexRaw:
          pattern: "Webhooks: disabled"

  - it: should show cert-manager enabled by default
    asserts:
      - matchRegexRaw:
          pattern: "cert-manager: enabled"

  - it: should show manual TLS warning when webhook enabled but certmanager disabled
    set:
      webhook.enabled: true
      certmanager.enabled: false
    asserts:
      - matchRegexRaw:
          pattern: "WARNING.*Webhooks are enabled but cert-manager is disabled"

  - it: should show ServiceMonitor enabled when toggled
    set:
      serviceMonitor.enabled: true
    asserts:
      - matchRegexRaw:
          pattern: "ServiceMonitor: enabled"

  - it: should not show ServiceMonitor when disabled (default)
    asserts:
      - notMatchRegexRaw:
          pattern: "ServiceMonitor: enabled"
