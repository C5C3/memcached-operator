---
suite: ServiceMonitor template
templates:
  - templates/servicemonitor.yaml
release:
  name: test-release
  namespace: test-ns
chart:
  appVersion: "0.1.0"
  version: "0.1.0"
tests:
  # ====================================================================
  # Suite 1: Conditional rendering
  # ====================================================================

  - it: should not render when serviceMonitor.enabled is false (default)
    asserts:
      - hasDocuments:
          count: 0

  - it: should render when serviceMonitor.enabled is true
    set:
      serviceMonitor.enabled: true
    asserts:
      - hasDocuments:
          count: 1

  # ====================================================================
  # Suite 2: Kind and API version
  # ====================================================================

  - it: should render correct kind and apiVersion
    set:
      serviceMonitor.enabled: true
    asserts:
      - isKind:
          of: ServiceMonitor
      - isAPIVersion:
          of: monitoring.coreos.com/v1

  # ====================================================================
  # Suite 3: Metadata
  # ====================================================================

  - it: should set name using fullname-metrics pattern
    set:
      serviceMonitor.enabled: true
    asserts:
      - equal:
          path: metadata.name
          value: test-release-memcached-operator-metrics

  - it: should set namespace to release namespace
    set:
      serviceMonitor.enabled: true
    asserts:
      - equal:
          path: metadata.namespace
          value: test-ns

  # ====================================================================
  # Suite 4: Labels
  # ====================================================================

  - it: should include all standard labels
    set:
      serviceMonitor.enabled: true
    asserts:
      - exists:
          path: metadata.labels["helm.sh/chart"]
      - exists:
          path: metadata.labels["app.kubernetes.io/name"]
      - exists:
          path: metadata.labels["app.kubernetes.io/instance"]
      - exists:
          path: metadata.labels["app.kubernetes.io/version"]
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm

  - it: should include control-plane label
    set:
      serviceMonitor.enabled: true
    asserts:
      - equal:
          path: metadata.labels.control-plane
          value: controller-manager

  - it: should include additional labels when set
    set:
      serviceMonitor.enabled: true
      serviceMonitor.additionalLabels:
        prometheus: kube-prometheus
        team: backend
    asserts:
      - equal:
          path: metadata.labels.prometheus
          value: kube-prometheus
      - equal:
          path: metadata.labels.team
          value: backend

  - it: should not include additional labels when not set
    set:
      serviceMonitor.enabled: true
    asserts:
      - notExists:
          path: metadata.labels.prometheus

  # ====================================================================
  # Suite 5: Endpoint configuration
  # ====================================================================

  - it: should set endpoint path to /metrics
    set:
      serviceMonitor.enabled: true
    asserts:
      - equal:
          path: spec.endpoints[0].path
          value: /metrics

  - it: should set endpoint port to metrics
    set:
      serviceMonitor.enabled: true
    asserts:
      - equal:
          path: spec.endpoints[0].port
          value: metrics

  - it: should set endpoint scheme to https
    set:
      serviceMonitor.enabled: true
    asserts:
      - equal:
          path: spec.endpoints[0].scheme
          value: https

  - it: should set bearerTokenFile
    set:
      serviceMonitor.enabled: true
    asserts:
      - equal:
          path: spec.endpoints[0].bearerTokenFile
          value: /var/run/secrets/kubernetes.io/serviceaccount/token

  - it: should set tlsConfig insecureSkipVerify to true
    set:
      serviceMonitor.enabled: true
    asserts:
      - equal:
          path: spec.endpoints[0].tlsConfig.insecureSkipVerify
          value: true

  # ====================================================================
  # Suite 6: Optional endpoint fields
  # ====================================================================

  - it: should not include interval by default
    set:
      serviceMonitor.enabled: true
    asserts:
      - notExists:
          path: spec.endpoints[0].interval

  - it: should set interval when configured
    set:
      serviceMonitor.enabled: true
      serviceMonitor.interval: "30s"
    asserts:
      - equal:
          path: spec.endpoints[0].interval
          value: "30s"

  - it: should not include scrapeTimeout by default
    set:
      serviceMonitor.enabled: true
    asserts:
      - notExists:
          path: spec.endpoints[0].scrapeTimeout

  - it: should set scrapeTimeout when configured
    set:
      serviceMonitor.enabled: true
      serviceMonitor.scrapeTimeout: "10s"
    asserts:
      - equal:
          path: spec.endpoints[0].scrapeTimeout
          value: "10s"

  # ====================================================================
  # Suite 7: Selector
  # ====================================================================

  - it: should include selectorLabels in selector matchLabels
    set:
      serviceMonitor.enabled: true
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: memcached-operator
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/instance"]
          value: test-release

  - it: should include control-plane label in selector matchLabels
    set:
      serviceMonitor.enabled: true
    asserts:
      - equal:
          path: spec.selector.matchLabels.control-plane
          value: controller-manager
